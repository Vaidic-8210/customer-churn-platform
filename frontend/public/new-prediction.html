<script src="js/common.js"></script>

<script>

buildNavbar(
"new"
);

const form=
document.getElementById(
"predictForm"
);

form.addEventListener(

"submit",

async function(e){

e.preventDefault();

const btn=
document.getElementById(
"submitBtn"
);

btn.disabled=true;

btn.innerHTML=
"Predicting...";

try{

const formData=

Object.fromEntries(

new FormData(
form
).entries()

);

const response=

await fetch(

"http://localhost:5000/api/predict",

{

method:
"POST",

headers:{
"Content-Type":
"application/json"
},

body:

JSON.stringify(
formData
)

}

);

const result=

await response.json();

if(
!result.success
){

throw new Error();

}

sessionStorage.setItem(

"churnResult",

JSON.stringify(

{

customer:
result.customer,

prediction:
result.prediction,

score:
result.score,

category:
result.category

}

)

);

window.location.href=

"result.html";

}

catch(error){

alert(
"Prediction Failed"
);

btn.disabled=false;

btn.innerHTML=
"Predict";

}

}

);

</script>
