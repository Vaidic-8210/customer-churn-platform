```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Analytics Dashboard
</title>

<link
rel="stylesheet"
href="css/styles.css">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

</head>

<body>

<div id="navbar"></div>

<main class="page">

<div class="page-head">

<h1>
Customer Retention Analytics
</h1>

<p>
Monitor churn trends and ML insights
</p>

</div>


<section
class="kpi-grid"
id="analyticsKpis">
</section>


<section class="chart-grid">

<div class="card">

<div class="card__head">
<h2>Churn vs Retained</h2>
</div>

<div id="churnDonut"></div>

</div>


<div class="card">

<div class="card__head">
<h2>Risk Distribution</h2>
</div>

<div id="riskDonut"></div>

</div>


<div class="card">

<div class="card__head">
<h2>Monthly Trend</h2>
</div>

<div id="trendBars"></div>

</div>


<div class="card">

<div class="card__head">
<h2>Contract Distribution</h2>
</div>

<div id="contractBars"></div>

</div>

</section>


<section class="card mt-24">

<div class="card__head">
<h2>AI Insights</h2>
</div>

<div
id="insightGrid"
class="insight-grid">
</div>

</section>

</main>


<script src="js/common.js"></script>

<script>

buildNavbar(
"analytics"
);

let analytics={};



async function loadAnalytics(){

try{

const response=
await fetch(
"http://localhost:5000/api/analytics"
);

if(!response.ok){

throw new Error();

}

analytics=
await response.json();

renderKPIs();

renderChurn();

renderRisk();

renderTrend();

renderContract();

renderInsights();

}

catch(err){

console.log(err);

document
.getElementById(
"analyticsKpis"
)
.innerHTML=

`
<div class="empty-state">
Unable to load analytics
</div>
`;

}

}



function renderKPIs(){

document
.getElementById(
"analyticsKpis"
)
.innerHTML=

`

<div class="kpi">
<div class="kpi__value">
${analytics.totalCustomers || 0}
</div>
<div class="kpi__label">
Total Customers
</div>
</div>


<div class="kpi">
<div class="kpi__value">
${analytics.churnRate || 0}%
</div>
<div class="kpi__label">
Average Risk
</div>
</div>


<div class="kpi">
<div class="kpi__value">
${analytics.highRiskCustomers || 0}
</div>
<div class="kpi__label">
High Risk
</div>
</div>


<div class="kpi">
<div class="kpi__value">
${analytics.modelAccuracy || 0}%
</div>
<div class="kpi__label">
Model Accuracy
</div>
</div>

`;

}



function renderChurn(){

const c=
analytics.churnSplit||{
churn:0,
stay:0
};

document
.getElementById(
"churnDonut"
)
.innerHTML=

`

<div class="summary-stat">
<span>Leave</span>
<strong>${c.churn}</strong>
</div>

<div class="summary-stat">
<span>Stay</span>
<strong>${c.stay}</strong>
</div>

`;

}



function renderRisk(){

const r=
analytics.riskDistribution||{
low:0,
medium:0,
high:0
};

document
.getElementById(
"riskDonut"
)
.innerHTML=

`

<div class="summary-stat">
<span>Low</span>
<strong>${r.low}</strong>
</div>

<div class="summary-stat">
<span>Medium</span>
<strong>${r.medium}</strong>
</div>

<div class="summary-stat">
<span>High</span>
<strong>${r.high}</strong>
</div>

`;

}



function renderTrend(){

const data=
analytics.monthlyTrend||[];

document
.getElementById(
"trendBars"
)
.innerHTML=

data.length

?

data.map(
x=>`

<div class="summary-stat">

<span>${x.month}</span>

<strong>${x.value}</strong>

</div>

`
).join("")

:

`
<div class="empty-state">
No trend data
</div>
`;

}



function renderContract(){

const data=
analytics.contractDistribution||{};

document
.getElementById(
"contractBars"
)
.innerHTML=

Object.keys(data).length

?

Object.entries(data)

.map(
x=>`

<div class="summary-stat">

<span>${x[0]}</span>

<strong>${x[1]}</strong>

</div>

`
)

.join("")

:

`
<div class="empty-state">
No contract data
</div>
`;

}



function renderInsights(){

const data=
analytics.insights||[];

document
.getElementById(
"insightGrid"
)
.innerHTML=

data.length

?

data.map(
x=>`

<div class="insight">

<p>

${x}

</p>

</div>

`

).join("")

:

`
<div class="empty-state">
No insights available
</div>
`;

}



loadAnalytics();

</script>

</body>

</html>
```
